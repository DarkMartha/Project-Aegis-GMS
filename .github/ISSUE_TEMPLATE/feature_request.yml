name: Feature request
description: Suggest an improvement or new module
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: Explain the interface, permissions, validation, and logging you expect.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: security
    attributes:
      label: Security considerations
      options:
        - label: I understand new administrative actions must be validated and authorised on the server.
          required: true
