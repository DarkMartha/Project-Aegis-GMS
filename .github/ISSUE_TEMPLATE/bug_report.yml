name: Bug report
description: Report a reproducible problem in Aegis GMS
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not post credentials, private player data, or exploitable security details here. Use SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Aegis version
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Rojo
        - RBXMX package
        - Manual copy
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behaviour and any error output.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Roblox Studio version, published/private server, relevant modules, and whether API Services are enabled.
